spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jewelcart_db
    username: jewelcart_user
    password: jewelcart_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true  # override — show SQL in dev only
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000  # 24 hours in milliseconds
