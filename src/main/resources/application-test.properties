# Test profile — used in GitHub Actions CI pipeline
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jewelcart_test}
spring.datasource.username=${DB_USERNAME:jewelcart_user}
spring.datasource.password=${DB_PASSWORD:jewelcart_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.servlet.context-path=/api

application.security.jwt.secret-key=${JWT_SECRET_KEY:test_secret_key_for_testing_only_min_32_chars}
application.security.jwt.expiration=86400000

razorpay.key-id=${RAZORPAY_KEY_ID:test_key}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:test_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:test_webhook}
razorpay.currency=INR

payment.gateway=razorpay
