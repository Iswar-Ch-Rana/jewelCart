spring:
  application:
    name: jewelcart
  profiles:
    active: dev  # default profile for local development

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema, JPA only validates
    show-sql: false        # true only when debugging
    open-in-view: false    # never true — causes N+1 problems
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  servlet:
    context-path: /api    # all endpoints automatically prefixed with /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always